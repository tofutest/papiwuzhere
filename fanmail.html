---
layout: fanmail
title: Papi Fan Mail 💌
permalink: /fanmail.html
---

<div class="paw-divider">💌 🐾 💌 🐾 💌</div>

{% assign entries = site.fanmail | sort: "date" | reverse %}
{% for entry in entries %}
<div class="fanmail-entry">
  <div class="fanmail-date">{{ entry.date | date: "%B %-d, %Y" }}</div>
  {% if entry.image %}
  <img src="{{ entry.image | relative_url }}" alt="{{ entry.image_alt }}">
  {% endif %}
  {{ entry.content }}
</div>
{% endfor %}

<div class="paw-divider">💌 🐾 💌 🐾 💌</div>
