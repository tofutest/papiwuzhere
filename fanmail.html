<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Papi Fan Mail 💌</title>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-size: 18px;
      font-family: 'Atkinson Hyperlegible', sans-serif;
      background: #fdf6e3;
      color: #3b2a1a;
      min-height: 100vh;
    }

    header {
      position: relative;
      color: #fdf6e3;
      text-align: center;
      border-bottom: 6px solid #c0782a;
      overflow: hidden;
      min-height: 320px;
    }

    header .hero-bg {
      width: 100%;
      height: 100%;
      max-height: 340px;
      min-height: 320px;
      object-fit: cover;
      object-position: center top;
      display: block;
      filter: brightness(0.55);
    }

    header .hero-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    header h1 {
      font-family: 'Permanent Marker', cursive;
      font-size: 3rem;
      letter-spacing: 2px;
      text-shadow: 2px 2px 0 #c0782a;
    }

    header p.tagline {
      margin-top: 0.5rem;
      font-style: italic;
      font-size: 1.1rem;
      color: #f5c97a;
    }

    .nav-link {
      display: inline-block;
      margin-top: 0.8rem;
      color: #f5c97a;
      font-size: 0.9rem;
      text-decoration: none;
      border: 1px solid #f5c97a;
      border-radius: 20px;
      padding: 0.2rem 0.9rem;
      opacity: 0.85;
    }

    .nav-link:hover { opacity: 1; }

    main {
      max-width: 780px;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
    }

    .paw-divider {
      text-align: center;
      font-size: 1.4rem;
      letter-spacing: 8px;
      margin: 1.5rem 0;
      color: #c0782a;
    }

    .fanmail-card {
      background: white;
      border-radius: 14px;
      padding: 1.8rem;
      margin-bottom: 2rem;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      border-left: 6px solid #c0782a;
      text-align: center;
    }

    .fanmail-card img {
      width: 100%;
      max-width: 420px;
      border-radius: 10px;
      display: block;
      margin: 0 auto 1.5rem;
      box-shadow: 0 4px 18px rgba(0,0,0,0.15);
    }

    .fanmail-card p {
      line-height: 1.7;
      font-size: 1.07rem;
      color: #5a3e28;
      font-style: italic;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.85rem;
      color: #aaa;
      border-top: 2px solid #e8d5b0;
      margin-top: 3rem;
    }

    footer strong { color: #c0782a; }

    @media (max-width: 680px) {
      header h1 { font-size: 2.2rem; }
      header .hero-content img { height: 80px !important; width: 80px !important; }
    }
  </style>
</head>
<body>

<header>
  <img src="PapiHeader.png" alt="Papi fan mail" class="hero-bg">
  <div class="hero-content">
    <img src="Logo2.png" alt="Papi" style="height:110px; width:110px; object-fit:cover; border-radius:50%; border:4px solid #c0782a; box-shadow:0 4px 20px rgba(0,0,0,0.5); margin-bottom:0.8rem;">
    <h1>Fan Mail</h1>
    <p class="tagline">He reads every letter. Eventually.</p>
    <a href="index.html" class="nav-link">← Field Journal</a>
  </div>
</header>

<main>
  <div class="paw-divider">💌 🐾 💌 🐾 💌</div>

  <div class="fanmail-card">
    <img src="papiresponse.jpg" alt="Papi responding to fan mail">
    <p>Papi is always happy to honor fan mail with a personalized signature.</p>
  </div>

  <div class="paw-divider">💌 🐾 💌 🐾 💌</div>
</main>

<footer>
  <p><strong>Papi Fan Mail</strong> · All signatures are originals · Paw prints extra</p>
  <p style="margin-top:0.4rem;">Response times vary. Papi is a busy dog.</p>
</footer>

</body>
</html>
