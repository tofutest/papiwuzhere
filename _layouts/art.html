<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: "Papi Art" }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

<header class="art-header">
  <img src="{{ '/PapiHeader.png' | relative_url }}" alt="Papi art gallery" class="hero-bg">
  <div class="art-header-content">
    <img src="{{ '/davinciPapi.jpg' | relative_url }}" alt="Papi" style="height:110px; width:110px; object-fit:cover; border-radius:50%; border:4px solid #c0782a; box-shadow:0 4px 20px rgba(0,0,0,0.5); margin-bottom:0.8rem;">
    <h1>Papi Art</h1>
    <p class="tagline">A curated collection of original works and pieces heavily inspired by other (deceased) artists.</p>
    <a href="{{ '/' | relative_url }}" class="nav-link">← Field Journal</a>
  </div>
</header>

<main>
  {{ content }}
</main>

<footer>
  <p><strong>Papi Art</strong> · All works are originals · No prints available · No refunds</p>
  <p style="margin-top:0.4rem;">Represented exclusively by himself. Gallery inquiries ignored.</p>
</footer>

</body>
</html>
