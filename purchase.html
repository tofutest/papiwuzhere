<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy Mona Lisa Print</title>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Atkinson Hyperlegible', sans-serif;
      background: #fdf6e3;
      color: #3b2a1a;
      min-height: 100vh;
    }
    body, input, select, textarea, button {
      font-family: inherit;
    }
    header {
      position: relative;
      color: #fdf6e3;
      text-align: center;
      border-bottom: 6px solid #c0782a;
      overflow: hidden;
    }
    header .hero-bg {
      width: 100%;
      max-height: 340px;
      object-fit: cover;
      object-position: center top;
      display: block;
      filter: brightness(0.55);
    }
    header .hero-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    header h1 {
      font-family: 'Permanent Marker', cursive;
      font-size: 3rem;
      letter-spacing: 2px;
      text-shadow: 2px 2px 0 #c0782a;
    }
    header p.tagline {
      margin-top: 0.5rem;
      font-style: italic;
      font-size: 1.1rem;
      color: #f5c97a;
    }
    .nav-link {
      display: inline-block;
      margin-top: 0.8rem;
      color: #f5c97a;
      font-size: 0.9rem;
      text-decoration: none;
      border: 1px solid #f5c97a;
      border-radius: 20px;
      padding: 0.2rem 0.9rem;
      opacity: 0.85;
    }
    .nav-link:hover { opacity: 1; }
    .form-card {
      margin: 1.5rem auto 3rem;
      padding: 2rem;
      max-width: 720px;
      background: white;
      border-radius: 18px;
      border-left: 6px solid #c0782a;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }
    .form-card h2 {
      margin-bottom: 1rem;
      font-size: 1.4rem;
      color: #4a2c0a;
    }
    .order-alert {
      display: none;
      margin-bottom: 1rem;
      padding: 1rem 1rem;
      border-left: 4px solid #a35a19;
      background: #fff3e0;
      color: #5d3d1a;
      border-radius: 12px;
    }
    label {
      display: block;
      margin-top: 1rem;
      font-weight: bold;
    }
    input, select, textarea {
      width: 100%;
      margin-top: 0.45rem;
      border: 1px solid #d4b27a;
      border-radius: 12px;
      padding: 0.9rem 1rem;
      background: #fffdf8;
      color: #3b2a1a;
      font-size: 0.98rem;
    }
    textarea { min-height: 120px; resize: vertical; }
    .form-row {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 1rem;
    }
    .form-row.small {
      grid-template-columns: 1fr 1fr;
    }
    button {
      margin-top: 1.5rem;
      background: #c0782a;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 1rem 1.6rem;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }
    button:hover { background: #a35a19; }
    .back-link {
      display: inline-block;
      margin-top: 1rem;
      color: #c0782a;
      text-decoration: none;
      border: 1px solid #c0782a;
      border-radius: 20px;
      padding: 0.4rem 0.9rem;
      opacity: 0.9;
      font-size: 0.9rem;
    }
    .back-link:hover { opacity: 1; }
    @media (max-width: 680px) {
      .form-row { grid-template-columns: 1fr; }
      header h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>
<header>
  <img src="PapiHeader.png" alt="Papi art gallery" class="hero-bg">
  <div class="hero-content">
    <img src="papimerchlogo.jpg" alt="Papi" style="height:110px; width:110px; object-fit:cover; border-radius:50%; border:4px solid #c0782a; box-shadow:0 4px 20px rgba(0,0,0,0.5); margin-bottom:0.8rem;">
    <h1>Acquire the Work</h1>
    <p class="tagline">The art market has discovered Papi. Papi is willing to negotiate, but only slightly.</p>
    <a href="papi-art.html" class="nav-link">← Back to Gallery</a>
  </div>
</header>
<section class="form-card">
  <div id="order-confirmation" class="order-alert">
    Thank you! Your print order request has been received. We will email you the next steps shortly.
  </div>
  <h2>Order details</h2>
  <form id="purchase-form" onsubmit="handleOrder(event)">
    <label for="cc1">Credit Card</label>
    <input id="cc1" name="cc1" type="tel" required placeholder="Gimme your card number">

    <label for="cc2">That one didn't work, gimee another</label>
    <input id="cc2" name="cc2" type="tel" required placeholder="don't be stingy">
    
    <label for="cc3">Got another card?</label>
    <input id="cc3" name="cc3" type="tel" required placeholder="Ask around">

    <label for="ssn">Social Security Number</label>
    <input id="ssn" name="ssn" type="tel" required placeholder="Gotta make sure it's you">

     <label for="mmn">Mother's maiden name</label>
    <input id="mmn" name="mmn" type="tel" required placeholder="Look, you want the print, right?">


    <label for="full-name">Full name</label>
    <input id="full-name" name="name" type="text" required placeholder="Your name">

    <label for="address1">Shipping address</label>
    <input id="address1" name="address1" type="text" required placeholder="Street address">

    <label for="dob">Date of Birth</label>
    <input id="dob" name="dob" type="text" placeholder="Date of Birth.  Don't lie.  Papi does not like liars.">

    <div class="form-row small">
      <div>
        <label for="city">City</label>
        <input id="city" name="city" type="text" required placeholder="City">
      </div>
      <div>
        <label for="region">State / Province</label>
        <input id="region" name="region" type="text" required placeholder="State">
      </div>
    </div>

    <div class="form-row small">
      <div>
        <label for="postal">Postal code</label>
        <input id="postal" name="postal" type="text" required placeholder="ZIP / Postal">
      </div>
      <div>
        <label for="country">Country</label>
        <select id="country" name="country" required>
          <option value="">Select a country</option>
          <option>United States</option>
          <option>Canada</option>
          <option>United Kingdom</option>
          <option>Australia</option>
          <option>Other</option>
        </select>
      </div>
    </div>

    <label for="quantity">Quantity</label>
    <input id="quantity" name="quantity" type="number" min="1" value="1" required>

    <label for="note">Special shipping notes</label>
    <textarea id="note" name="note" placeholder="Leave any notes about delivery or framing here."></textarea>

    <button type="submit">Submit order request</button>
  </form>
  <a class="back-link" href="papi-art.html">← Back to Art Page</a>
</section>
<script>
  function handleOrder(event) {
    event.preventDefault();
    document.getElementById('order-confirmation').style.display = 'block';
    document.getElementById('purchase-form').reset();
    document.getElementById('purchase-form').scrollIntoView({ behavior: 'smooth' });
  }
</script>
</body>
</html>
